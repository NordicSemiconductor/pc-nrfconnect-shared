name: Create source - Test variant to actually publish through a called workflow

on: workflow_call

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org
                  cache: npm
            - run: npm install -g npm@latest
            - run: npm ci
            - run: npm publish --tag prerelease
